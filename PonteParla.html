<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f172a;color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overscroll-behavior:none}
.header{background:linear-gradient(135deg,#1e3a5f 0%,#0f172a 100%);padding:16px 16px 0;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo h1{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.logo h1 span{color:#3b82f6}
.logo p{font-size:11px;color:#64748b;margin-top:1px}
.mode-toggle{display:flex;background:#0f172a;border-radius:12px;padding:3px;gap:3px;margin-bottom:14px}
.mode-btn{flex:1;padding:9px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:all .2s;color:#64748b;background:transparent}
.mode-btn.active{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.4)}
.tabs{display:flex}
.tab{flex:1;padding:11px 0;border:none;cursor:pointer;font-size:14px;font-weight:600;background:transparent;color:#475569;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:#3b82f6;border-bottom:2px solid #3b82f6}
.content{padding:14px;max-width:480px;margin:0 auto}
.cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{white-space:nowrap;padding:8px 14px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;background:#1e293b;color:#94a3b8}
.cat.active{background:#3b82f6;color:#fff}
.phrases{display:flex;flex-direction:column;gap:10px}
.phrase-card{background:#1e293b;border-radius:14px;padding:14px 16px;border:1px solid #334155}
.phrase-src{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.phrase-src span{font-size:15px;font-weight:600;color:#f1f5f9;flex:1;line-height:1.4}
.phrase-tgt{display:flex;justify-content:space-between;align-items:flex-start}
.phrase-tgt span{font-size:14px;color:#3b82f6;flex:1;line-height:1.4}
.icon-btn{background:none;border:none;cursor:pointer;font-size:17px;padding:0 3px;opacity:.7;transition:opacity .2s}
.icon-btn:hover{opacity:1}
.btns{display:flex;gap:4px}
.voice-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:8px 0}
.mic-btn{width:110px;height:110px;border-radius:50%;border:none;cursor:pointer;font-size:38px;display:flex;align-items:center;justify-content:center;transition:all .3s;background:linear-gradient(135deg,#3b82f6,#1d4ed8);box-shadow:0 8px 32px rgba(59,130,246,.4)}
.mic-btn.listening{background:linear-gradient(135deg,#ef4444,#b91c1c);box-shadow:0 0 0 10px rgba(239,68,68,.15),0 0 0 22px rgba(239,68,68,.08);transform:scale(1.05)}
.mic-hint{font-size:13px;color:#64748b;text-align:center}
.mic-hint.listening{color:#ef4444;font-weight:600}
.result-box{background:#1e293b;border-radius:14px;padding:14px;border:1px solid #334155;width:100%}
.result-box.translated{background:linear-gradient(135deg,#1e3a5f,#1e293b);border-color:#3b82f6}
.result-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.result-box.translated .result-label{color:#3b82f6}
.result-text{font-size:16px;line-height:1.5}
.result-box.translated .result-text{color:#93c5fd;font-weight:500}
.dots{display:flex;gap:5px;align-items:center;padding:4px 0}
.dot{width:8px;height:8px;border-radius:50%;background:#3b82f6;animation:bounce 1s infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
.tip-box{background:#1e293b;border-radius:14px;padding:14px;border:1px solid #334155;width:100%}
.tip-box p{font-size:12px;color:#64748b;margin-bottom:6px;font-weight:600}
.tip-box li{font-size:12px;color:#64748b;line-height:1.9;margin-left:14px}
.install-banner{background:linear-gradient(135deg,#1e3a5f,#172554);border:1px solid #3b82f6;border-radius:14px;padding:14px;margin-bottom:14px;display:flex;gap:12px;align-items:center}
.install-banner .i-icon{font-size:28px}
.install-banner .i-text p{font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:2px}
.install-banner .i-text span{font-size:11px;color:#64748b}
.install-btn{margin-left:auto;background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-icon">🌉</div>
    <div>
      <h1>Ponte<span>·</span>Parla</h1>
      <p>Shqip ↔ Italisht • Çdo ditë</p>
    </div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-sq-it" onclick="setMode('sq-it')">🇦🇱 Shqip → 🇮🇹 Italisht</button>
    <button class="mode-btn" id="btn-it-sq" onclick="setMode('it-sq')">🇮🇹 Italisht → 🇦🇱 Shqip</button>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-phrases" onclick="setTab('phrases')">📋 Fraza</button>
    <button class="tab" id="tab-voice" onclick="setTab('voice')">🎤 Zëri</button>
  </div>
</div>

<div class="content">
  <div id="install-banner" class="install-banner" style="display:none">
    <div class="i-icon">📲</div>
    <div class="i-text"><p>Shkarko Ponte·Parla</p><span>Shto në ekranin kryesor</span></div>
    <button class="install-btn" onclick="installApp()">Shkarko</button>
  </div>

  <!-- PHRASES -->
  <div id="tab-phrases-content">
    <div class="cats">
      <button class="cat active" onclick="setCat('daily',this)">💬 Përditshme</button>
      <button class="cat" onclick="setCat('hospital',this)">🏥 Spital</button>
      <button class="cat" onclick="setCat('shop',this)">🛒 Dyqane</button>
      <button class="cat" onclick="setCat('transport',this)">🚌 Transport</button>
    </div>
    <div class="phrases" id="phrases-list"></div>
  </div>

  <!-- VOICE -->
  <div id="tab-voice-content" style="display:none">
    <div class="voice-wrap">
      <p style="font-size:13px;color:#64748b;text-align:center" id="voice-dir"></p>
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
      <p class="mic-hint" id="mic-hint">Shtyp mikrofonin dhe fol</p>
      <div class="result-box" id="transcript-box" style="display:none">
        <div class="result-label"><span id="src-label"></span><button class="icon-btn" onclick="speakText(document.getElementById('transcript-text').textContent, srcLang)">🔊</button></div>
        <div class="result-text" id="transcript-text"></div>
      </div>
      <div class="result-box translated" id="translation-box" style="display:none">
        <div class="result-label">
          <span id="tgt-label"></span>
          <div class="btns">
            <button class="icon-btn" onclick="speakText(document.getElementById('translation-text').textContent, tgtLang)">🔊</button>
            <button class="icon-btn" id="copy-btn" onclick="copyTrans()">📋</button>
          </div>
        </div>
        <div class="result-text" id="translation-text"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
      </div>
      <div class="tip-box" id="tip-box">
        <p>💡 Këshilla:</p>
        <ul>
          <li>Fol qartë dhe mos nxito</li>
          <li>Funksionon më mirë me Chrome</li>
          <li>Ndërroni drejtimin sipër</li>
        </ul>
      </div>
    </div>
  </div>
</div>

<script>
const PHRASES = {
  daily:[
    {sq:"Mirëdita!",it:"Buongiorno!"},
    {sq:"Faleminderit",it:"Grazie"},
    {sq:"Nuk kuptoj",it:"Non capisco"},
    {sq:"Mund të flisni më ngadalë?",it:"Può parlare più lentamente?"},
    {sq:"Sa kushton?",it:"Quanto costa?"},
    {sq:"Ku është tualeti?",it:"Dov'è il bagno?"},
    {sq:"Po / Jo",it:"Sì / No"},
    {sq:"Më falni",it:"Mi scusi"},
    {sq:"Nuk flas italisht",it:"Non parlo italiano"},
    {sq:"A flisni anglisht?",it:"Parla inglese?"}
  ],
  hospital:[
    {sq:"Më duhet mjek",it:"Ho bisogno di un medico"},
    {sq:"Kam dhimbje",it:"Ho dolore"},
    {sq:"Më dhemb koka",it:"Ho mal di testa"},
    {sq:"Më dhemb stomaku",it:"Ho mal di stomaco"},
    {sq:"Jam alergjik",it:"Sono allergico"},
    {sq:"Ku është spitali?",it:"Dov'è l'ospedale?"},
    {sq:"Thirr ambulancën!",it:"Chiama l'ambulanza!"},
    {sq:"Kam nevojë për recetë",it:"Ho bisogno di una ricetta"},
    {sq:"Nuk ndihem mirë",it:"Non mi sento bene"},
    {sq:"Kam temperaturë",it:"Ho la febbre"}
  ],
  shop:[
    {sq:"Ku është kjo?",it:"Dov'è questo?"},
    {sq:"Sa kushton?",it:"Quanto costa?"},
    {sq:"Dua të paguaj me kartë",it:"Voglio pagare con la carta"},
    {sq:"A mund ta kthej?",it:"Posso restituirlo?"},
    {sq:"Ku janë kasat?",it:"Dove sono le casse?"},
    {sq:"Keni zbritje?",it:"Avete sconti?"},
    {sq:"A mund të marr qese?",it:"Posso avere un sacchetto?"},
    {sq:"Ku është sektori i...?",it:"Dov'è il reparto di...?"},
    {sq:"Nuk funksionon",it:"Non funziona"},
    {sq:"Dua numrin e faturës",it:"Voglio lo scontrino"}
  ],
  transport:[
    {sq:"Si shkoj te...?",it:"Come arrivo a...?"},
    {sq:"Ku ndalet autobusi?",it:"Dove si ferma l'autobus?"},
    {sq:"Një biletë, ju lutem",it:"Un biglietto, per favore"},
    {sq:"Ku është stacioni?",it:"Dov'è la stazione?"},
    {sq:"Kur nis treni?",it:"Quando parte il treno?"},
    {sq:"Jam i humbur",it:"Mi sono perso"},
    {sq:"Thirr taksi, ju lutem",it:"Chiami un taxi, per favore"},
    {sq:"Sa kohë zgjat?",it:"Quanto tempo ci vuole?"},
    {sq:"Ku ndalet metro?",it:"Dove si ferma la metro?"},
    {sq:"A ndalet këtu?",it:"Si ferma qui?"}
  ]
};

let mode = 'sq-it';
let currentCat = 'daily';
let srcLang = 'sq';
let tgtLang = 'it';
let isListening = false;
let recognition = null;
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').style.display = 'none';
    });
  } else {
    alert('iPhone: Shtyp butonin Share (⬆️) dhe pastaj "Add to Home Screen"\nAndroid: Menu (⋮) → "Add to Home Screen"');
  }
}

function setMode(m) {
  mode = m;
  srcLang = m === 'sq-it' ? 'sq' : 'it';
  tgtLang = m === 'sq-it' ? 'it' : 'sq';
  document.getElementById('btn-sq-it').className = 'mode-btn' + (m==='sq-it'?' active':'');
  document.getElementById('btn-it-sq').className = 'mode-btn' + (m==='it-sq'?' active':'');
  renderPhrases();
  updateVoiceUI();
}

function setTab(t) {
  document.getElementById('tab-phrases-content').style.display = t==='phrases'?'block':'none';
  document.getElementById('tab-voice-content').style.display = t==='voice'?'block':'none';
  document.getElementById('tab-phrases').className = 'tab'+(t==='phrases'?' active':'');
  document.getElementById('tab-voice').className = 'tab'+(t==='voice'?' active':'');
  updateVoiceUI();
}

function setCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat').forEach(b => b.className='cat');
  btn.className = 'cat active';
  renderPhrases();
}

function renderPhrases() {
  const list = document.getElementById('phrases-list');
  const phrases = PHRASES[currentCat];
  list.innerHTML = phrases.map((p,i) => {
    const src = p[srcLang]; const tgt = p[tgtLang];
    return `<div class="phrase-card">
      <div class="phrase-src">
        <span>${src}</span>
        <button class="icon-btn" onclick="speakText('${src.replace(/'/g,"\'")}','${srcLang}')">🔊</button>
      </div>
      <div class="phrase-tgt">
        <span>${tgt}</span>
        <div class="btns">
          <button class="icon-btn" onclick="speakText('${tgt.replace(/'/g,"\'")}','${tgtLang}')">🔊</button>
          <button class="icon-btn" id="cp-${i}" onclick="copyPhrase('${tgt.replace(/'/g,"\'")}','${i}')">📋</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function updateVoiceUI() {
  const sl = srcLang==='sq'?'🇦🇱 Shqip':'🇮🇹 Italisht';
  const tl = tgtLang==='it'?'🇮🇹 Italisht':'🇦🇱 Shqip';
  const d = document.getElementById('voice-dir');
  if(d) d.textContent = `Fol në ${sl} → Përkthehet në ${tl}`;
  const sl2 = document.getElementById('src-label');
  if(sl2) sl2.textContent = sl;
  const tl2 = document.getElementById('tgt-label');
  if(tl2) tl2.textContent = tl;
}

function speakText(text, lang) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang==='it'?'it-IT':'sq-AL';
  window.speechSynthesis.speak(u);
}

function copyPhrase(text, i) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('cp-'+i);
    if(btn) { btn.textContent='✅'; setTimeout(()=>btn.textContent='📋',1500); }
  });
}

function copyTrans() {
  const text = document.getElementById('translation-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent='✅'; setTimeout(()=>btn.textContent='📋',1500);
  });
}

function toggleMic() {
  if(isListening) stopMic(); else startMic();
}

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) { alert('Përdor Chrome për mikrofonin!'); return; }
  recognition = new SR();
  recognition.lang = srcLang==='sq'?'sq-AL':'it-IT';
  recognition.interimResults = false;
  recognition.onstart = () => {
    isListening = true;
    document.getElementById('mic-btn').className = 'mic-btn listening';
    document.getElementById('mic-btn').textContent = '⏹️';
    document.getElementById('mic-hint').textContent = 'Po dëgjon... Fol tani!';
    document.getElementById('mic-hint').className = 'mic-hint listening';
    document.getElementById('tip-box').style.display='none';
  };
  recognition.onend = () => {
    isListening = false;
    document.getElementById('mic-btn').className = 'mic-btn';
    document.getElementById('mic-btn').textContent = '🎤';
    document.getElementById('mic-hint').textContent = 'Shtyp mikrofonin dhe fol';
    document.getElementById('mic-hint').className = 'mic-hint';
  };
  recognition.onresult = async e => {
    const text = e.results[0][0].transcript;
    document.getElementById('transcript-text').textContent = text;
    document.getElementById('transcript-box').style.display='block';
    document.getElementById('translation-text').innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    document.getElementById('translation-box').style.display='block';
    updateVoiceUI();
    try {
      const from = srcLang==='sq'?'shqip':'italisht';
      const to = tgtLang==='it'?'italisht':'shqip';
      const resp = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:`Përkthe nga ${from} në ${to}. Kthe VETËM përkthimin:
"${text}"`}]})
      });
      const data = await resp.json();
      document.getElementById('translation-text').textContent = data.content?.[0]?.text || 'Gabim';
    } catch { document.getElementById('translation-text').textContent = 'Gabim në lidhje.'; }
  };
  recognition.start();
}

function stopMic() { if(recognition) recognition.stop(); }

renderPhrases();
updateVoiceUI();

if('serviceWorker' in navigator) {
  const sw = `self.addEventListener('install',e=>e.waitUntil(caches.open('ponte-v1').then(c=>c.addAll(['.']))));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  const blob = new Blob([sw], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}
</script>
</body>
</html>
